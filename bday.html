
<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday 🐭</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    color:white;
}

/* Floating Hearts */
.heart{
    position:absolute;
    animation:float 6s linear infinite;
    opacity:0.7;
}

@keyframes float{
    0%{transform:translateY(100vh) scale(0.5);}
    100%{transform:translateY(-10vh) scale(1.5);}
}

/* Pages */
.page{
    display:none;
    text-align:center;
    animation:fade 0.6s ease-in-out;
}

.page.active{
    display:block;
}

@keyframes fade{
    from{opacity:0;transform:scale(0.95);}
    to{opacity:1;transform:scale(1);}
}

/* Premium Card */
.card{
    background:rgba(255,255,255,0.07);
    padding:40px;
    border-radius:25px;
    backdrop-filter:blur(15px);
    transition:0.4s;
    box-shadow:0 0 25px rgba(255,0,100,0.3);
}

.card:hover{
    transform:translateY(-10px) rotateX(3deg);
    box-shadow:0 0 40px #ff4d6d,
               0 0 80px #ff00ff;
}

/* Premium Button */
button{
    margin-top:25px;
    padding:12px 30px;
    border:none;
    border-radius:30px;
    font-size:16px;
    cursor:pointer;
    background:linear-gradient(45deg,#ff4d6d,#ff00ff);
    color:white;
    transition:0.4s;
}

button:hover{
    box-shadow:0 0 20px #ff4d6d,
               0 0 40px #ff00ff,
               0 0 60px white;
    transform:scale(1.1);
}

/* Photo Glow */
.photo{
    width:300px;
    height:400px;
    margin:auto;
    border-radius:20px;
    overflow:hidden;
    position:relative;
    transition:0.4s;
}

.photo img{
    width:100%;
    height:100%;
    object-fit:cover;
    transition:0.4s;
    border-radius:20px;
}

.photo:hover img{
    transform:scale(1.08);
}

.photo:hover{
    box-shadow:0 0 30px #ff4d6d,
               0 0 60px #ff00ff,
               0 0 90px #00ffff;
}

/* Heart Burst */
.burst{
    position:absolute;
    font-size:20px;
    pointer-events:none;
    animation:burst 1s ease-out forwards;
}

@keyframes burst{
    0%{opacity:1;transform:translate(0,0) scale(1);}
    100%{opacity:0;transform:translate(var(--x),var(--y)) scale(1.8);}
}
</style>
</head>
<body >
    <audio id="bgMusic" autoplay loop>
    <source src=".vscode/Un Kannula Poonthu Poonthu - Esa Kaaththa _ My Lord _ Tamil.mp3" type="audio/mpeg">
</audio>

<!-- Page 1 -->
<div class="page active">
    <div class="card">
        <h1>🐭 Happy B'day my dear jejaa..! 💗</h1>
        <p>I don't want you to be my mouse🐭 I want you to be my spouse👰🏻‍♀️✨</p>
        <button onclick="nextPage()">hug me...!🫂</button>
    </div>
</div>

<!-- 6 Photo Pages -->
<div class="page"><div class="card">
    <div class="photo" onmouseenter="heartBurst(event)">
        <img src=".vscode/pic1.jpg.jpeg">
    </div>
    <button onclick="nextPage()">Next 🫶🏻</button>
</div></div>

<div class="page"><div class="card">
    <div class="photo" onmouseenter="heartBurst(event)">
        <img src=".vscode/pic4.jpg.jpeg">
    </div>
    <button onclick="nextPage()">Next 🫰🏻</button>
</div></div>

<div class="page"><div class="card">
    <div class="photo" onmouseenter="heartBurst(event)">
        <img src=".vscode/pic7.jpeg">
    </div>
    <button onclick="nextPage()">Next 👊🏻</button>
</div></div>

<div class="page"><div class="card">
    <div class="photo" onmouseenter="heartBurst(event)">
        <img src=".vscode/pic6.jpg.jpeg">
    </div>
    <button onclick="nextPage()">Next 👉🏻👈🏻 </button>
</div></div>

<div class="page"><div class="card">
    <div class="photo" onmouseenter="heartBurst(event)">
        <img src=".vscode/pic3.jpg.jpeg">
    </div>
    <button onclick="nextPage()">Next 🫵🏻</button>
</div></div>

<div class="page"><div class="card">
    <div class="photo" onmouseenter="heartBurst(event)">
        <img src=".vscode/pic5jpg.jpeg">
    </div>
    <button onclick="nextPage()">Back To Start 💕</button>
</div></div>


<script>
    window.addEventListener("click", () => {
    document.getElementById("bgMusic").play();
}, { once: true });

let pages=document.querySelectorAll(".page");
let current=0;

function nextPage(){
    pages[current].classList.remove("active");
    current=(current+1)%pages.length;
    pages[current].classList.add("active");
}

/* Floating Hearts Background */
function createHeart(){
    const heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="🩵         💗";
    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=Math.random()*20+10+"px";
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),6000);
}
setInterval(createHeart,500);

/* Heart Burst on Photo Hover */
function heartBurst(e){
    for(let i=0;i<8;i++){
        let heart=document.createElement("div");
        heart.className="burst";
        heart.innerHTML="🐭";
        heart.style.left=e.clientX+"px";
        heart.style.top=e.clientY+"px";
        heart.style.setProperty('--x',(Math.random()*200-100)+"px");
        heart.style.setProperty('--y',(Math.random()*200-100)+"px");
        document.body.appendChild(heart);
        setTimeout(()=>heart.remove(),1000);
    }
}

</script>

</body>
</html>
